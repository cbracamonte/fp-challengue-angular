<footer class="border-t border-gray-200 bg-white" role="contentinfo">
  <div class="mx-auto max-w-7xl px-6 py-10">
    <div class="grid grid-cols-1 gap-x-8 gap-y-10 lg:grid-cols-4">
      @for (column of navColumns(); track column.title) {
        <nav [attr.aria-label]="column.title">
          <h2 class="text-sm font-bold text-gray-900">{{ column.title }}</h2>
          <ul class="mt-4 space-y-3">
            @for (link of column.links; track link.href) {
              <li>
                <a
                  [href]="link.href"
                  class="text-sm text-gray-500 hover:text-primary hover:underline"
                >
                  {{ link.label }}
                </a>
              </li>
            }
          </ul>
        </nav>
      }

      <div class="space-y-8">
        <section aria-labelledby="footer-social">
          <h2 id="footer-social" class="text-sm font-bold text-gray-900">Síguenos en</h2>
          <ul class="mt-3 flex gap-2" role="list">
            <li>
              <a
                href="https://facebook.com/inkafarma"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Síguenos en Facebook"
                class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary text-white transition-colors hover:bg-primary-hover"
              >
                <svg
                  aria-hidden="true"
                  focusable="false"
                  class="h-5 w-5"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-2.9h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6v1.8H16l-.4 2.9h-2.3v7A10 10 0 0 0 22 12Z"
                  />
                </svg>
              </a>
            </li>
            <li>
              <a
                href="https://instagram.com/inkafarma"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Síguenos en Instagram"
                class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary text-white transition-colors hover:bg-primary-hover"
              >
                <svg
                  aria-hidden="true"
                  focusable="false"
                  class="h-5 w-5"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 2.2c3.2 0 3.6 0 4.9.1 1.2.1 1.8.3 2.2.4.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.1.4.3 1 .4 2.2.1 1.3.1 1.7.1 4.9s0 3.6-.1 4.9c-.1 1.2-.3 1.8-.4 2.2-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.1-1 .3-2.2.4-1.3.1-1.7.1-4.9.1s-3.6 0-4.9-.1c-1.2-.1-1.8-.3-2.2-.4-.6-.2-1-.5-1.4-.9-.4-.4-.7-.8-.9-1.4-.1-.4-.3-1-.4-2.2C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.9c.1-1.2.3-1.8.4-2.2.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.1 1-.3 2.2-.4C8.4 2.2 8.8 2.2 12 2.2Zm0 1.8c-3.1 0-3.5 0-4.7.1-.9 0-1.4.2-1.7.3-.4.2-.7.4-1 .7-.3.3-.5.6-.7 1-.1.3-.3.8-.3 1.7-.1 1.2-.1 1.6-.1 4.7s0 3.5.1 4.7c0 .9.2 1.4.3 1.7.2.4.4.7.7 1 .3.3.6.5 1 .7.3.1.8.3 1.7.3 1.2.1 1.6.1 4.7.1s3.5 0 4.7-.1c.9 0 1.4-.2 1.7-.3.4-.2.7-.4 1-.7.3-.3.5-.6.7-1 .1-.3.3-.8.3-1.7.1-1.2.1-1.6.1-4.7s0-3.5-.1-4.7c0-.9-.2-1.4-.3-1.7-.2-.4-.4-.7-.7-1-.3-.3-.6-.5-1-.7-.3-.1-.8-.3-1.7-.3-1.2-.1-1.6-.1-4.7-.1Zm0 3.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8Zm0 8a3.1 3.1 0 1 0 0-6.2 3.1 3.1 0 0 0 0 6.2Zm6.3-8.2a1.1 1.1 0 1 1-2.3 0 1.1 1.1 0 0 1 2.3 0Z"
                  />
                </svg>
              </a>
            </li>
          </ul>
        </section>

        <section aria-labelledby="footer-claims">
          <h2 id="footer-claims" class="text-sm font-bold text-gray-900">Libro de reclamaciones</h2>
          <a
            href="/libro-de-reclamaciones"
            class="mt-3 inline-block rounded-md p-1 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary"
            aria-label="Ir al libro de reclamaciones"
          >
            <img
              ngSrc="/images/libro_reclamaciones.png"
              alt="Libro de Reclamaciones"
              width="80"
              height="56"
            />
          </a>
        </section>

        <section aria-labelledby="footer-apps">
          <h2 id="footer-apps" class="text-sm font-bold text-gray-900">Descarga nuestra app en</h2>
          <ul class="mt-3 flex flex-wrap gap-2" role="list">
            <li>
              <a
                href="https://play.google.com/store/apps/details?id=pe.inkafarma"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Descargar en Google Play"
                class="flex items-center gap-2 rounded-full border border-gray-400 px-3 py-1.5 text-xs font-medium text-gray-800 transition-colors hover:border-primary hover:text-primary"
              >
                <svg
                  aria-hidden="true"
                  focusable="false"
                  class="h-4 w-4 shrink-0"
                  viewBox="0 0 24 24"
                >
                  <path
                    fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  />
                  <path
                    fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  />
                  <path
                    fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  />
                  <path
                    fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  />
                </svg>
                Google Play
              </a>
            </li>
            <li>
              <a
                href="https://apps.apple.com/pe/app/inkafarma"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Descargar en App Store"
                class="flex items-center gap-2 rounded-full border border-gray-400 px-3 py-1.5 text-xs font-medium text-gray-800 transition-colors hover:border-primary hover:text-primary"
              >
                <svg
                  aria-hidden="true"
                  focusable="false"
                  class="h-4 w-4 shrink-0"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
                  />
                </svg>
                App Store
              </a>
            </li>
          </ul>
        </section>
      </div>
    </div>
  </div>

  <div class="border-t border-gray-200 bg-gray-100">
    <div class="mx-auto max-w-7xl px-6 py-4">
      <p class="text-center text-sm text-gray-500">{{ copyright() }}</p>
    </div>
  </div>
</footer>
