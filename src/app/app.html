<main class="main">
  <section class="content">
    <h1>{{ title() }}</h1>
    <p>Respuesta de /api/products</p>

    @if (error()) {
      <pre class="json error">{{ error() }}</pre>
    } @else if (products()) {
      <pre class="json">{{ products() | json }}</pre>
    } @else {
      <p>Cargando productos...</p>
    }
  </section>
</main>
